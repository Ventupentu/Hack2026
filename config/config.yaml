# Base settings for retrieval training (Hydra)
defaults:
  - _self_
  - files: file.yaml

params:
  batch_size: 64
  epochs: 20
  lr: 1e-5
  weight_decay: 1e-4
  seed: 42
  num_workers: 4
  device: cuda
  model_name: openclip_marqo_siglip
  multi_gpu: false
  gpu_ids: "0"
  amp: true
  grad_accum: 1
  log_every: 50
  save_every: 1
  max_val_k: 200
  recall_k: 15
  use_bundle_boxes: true
  bbox_model_id: kesimeg/yolov8n-clothing-detection
  bbox_conf_threshold: 0.25
  bbox_iou_threshold: 0.45
  bbox_max_per_image: 15
  bbox_min_area_ratio: 0.001
  bbox_cache_path: ""

infer:
  val_ratio: 0.2
  eval_ks: "1,5,10,15"
  top_n_submit: 15
