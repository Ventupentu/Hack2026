# Legacy config kept for compatibility.
# Current project mode: pretrained-only (no fine-tuning).
defaults:
  - _self_
  - files: file.yaml

params:
  mode: pretrained_only
  seed: 42
  model_name: hf-hub:Marqo/marqo-fashionSigLIP
  detector_model: IDEA-Research/grounding-dino-base
  box_threshold: 0.25
  text_threshold: 0.25
  max_boxes: 10
  padding: 0.15
  topk_per_crop: 200
  index_mode: brute
  use_faiss_gpu: false

infer:
  checkpoint_path: artifacts/retrieval/pretrained_encoder.pt
  top_n_submit: 15
  eval_ks: "5,10,15"
