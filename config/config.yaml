# Base settings for retrieval training (Hydra)
defaults:
  - _self_
  - files: file.yaml

params:
  batch_size: 64
  epochs: 15
  lr: 3e-5
  weight_decay: 1e-4
  seed: 42
  num_workers: 4
  device: cuda
  model_name: openclip_marqo_siglip
  multi_gpu: false
  gpu_ids: "0"
  amp: true
  grad_accum: 4
  log_every: 50
  save_every: 1
  max_val_k: 200
  recall_k: 15
  use_bundle_boxes: true
  bbox_model_id: kesimeg/yolov8n-clothing-detection
  bbox_conf_threshold: 0.25
  bbox_iou_threshold: 0.45
  bbox_max_per_image: 15
  bbox_min_area_ratio: 0.001
  bbox_cache_path: ""
  # Hard negative mining
  mine_every: 3
  hard_neg_top_k: 16
  max_hard_negatives: 2
  max_positives: 4

infer:
  checkpoint_path: ""
  tta_num_augs: 1
  per_crop_topk: 150
  top_n_submit: 15
  val_ratio: 0.1
  eval_ks: "5,10,15"
  # Gender filtering: discard products whose known gender ≠ bundle section
  gender_filter: true
  # Category diversity: max products per product_description (0 = unlimited)
  max_per_category: 2
  # Score threshold: drop results below this cosine similarity (0.0 = keep all)
  score_threshold: 0.8
