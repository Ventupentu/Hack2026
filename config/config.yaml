# Base settings for retrieval training (Hydra)
defaults:
  - _self_
  - files: file.yaml

params:
  batch_size: 32
  epochs: 5
  lr: 1e-5
  weight_decay: 1e-4
  seed: 42
  num_workers: 4
  device: cuda
  multi_gpu: true
  gpu_ids: "0,1"
  amp: true
  grad_accum: 1
  log_every: 50
  save_every: 1
  max_val_k: 200
  recall_k: 15
