# Base settings for retrieval training (Hydra)
defaults:
  - _self_
  - files: file.yaml

params:
  batch_size: 16
  epochs: 15
  lr: 3e-5
  weight_decay: 1e-4
  seed: 42
  num_workers: 16
  device: cuda
  model_name: openclip_marqo_siglip
  grlite_model_name: "srpone/gr-lite"
  grlite_input_size: 518
  grlite_feature_dim: 256
  grlite_temperature: 0.07
  grlite_val_ratio: 0.1
  grlite_resume_checkpoint: ""
  multi_gpu: true
  gpu_ids: "0,1"
  amp: true
  grad_accum: 8
  log_every: 50
  save_every: 1
  max_val_k: 200
  recall_k: 15
  use_bundle_boxes: true
  bbox_model_id: kesimeg/yolov8n-clothing-detection
  bbox_conf_threshold: 0.25
  bbox_iou_threshold: 0.45
  bbox_max_per_image: 15
  bbox_min_area_ratio: 0.001
  bbox_cache_path: ""
  # Memory-efficient fine-tuning
  freeze_backbone: true
  unfreeze_last_n_blocks: 4
  proj_hidden_dim: 512
  # LoRA fine-tuning (overrides freeze_backbone when use_lora=true)
  use_lora: false
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  # Resume: "auto" = find last.pt automatically, "" = start fresh, or explicit path
  resume_from: "auto"
  # Hard negative mining (category-aware batching from product_dataset.csv)
  use_hard_negatives: true
  mine_every: 3
  hard_neg_top_k: 16
  max_hard_negatives: 2
  max_positives: 4

infer:
  # Encoder backend for inference: openclip | gr-lite
  encoder_backend: openclip
  checkpoint_path: ""
  # Hugging Face repo or local path for GR-Lite
  grlite_model_name: "srpone/gr-lite"
  # Input resize used by GR-Lite tensor pipeline
  grlite_input_size: 518
  # Output embedding dimension used by GR-Lite .search()
  grlite_feature_dim: 256
  tta_num_augs: 1
  per_crop_topk: 150
  top_n_submit: 15
  val_ratio: 0.1
  eval_ks: "5,10,15"
  # Gender filtering: discard products whose known gender ≠ bundle section
  gender_filter: true
  # Category diversity: max products per product_description (0 = unlimited)
  max_per_category: 2
  # Score threshold: drop results below this cosine similarity (0.0 = keep all)
  score_threshold: 0.3
